<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anypedia Redirect</title>
</head>
<body>
<script>
const parts = location.pathname.replace(/\/+$/, '').split('/').filter(Boolean);
const teamIndex = parts.indexOf('team');
let baseParts;
let target;

if (teamIndex >= 0 && parts[teamIndex + 1]) {
  baseParts = parts.slice(0, teamIndex);
  target = `${baseParts.length ? '/' + baseParts.join('/') : ''}/team.html?id=${encodeURIComponent(decodeURIComponent(parts[teamIndex + 1]))}`;
} else if (parts.length) {
  baseParts = parts.slice(0, -1);
  target = `${baseParts.length ? '/' + baseParts.join('/') : ''}/tournament.html?id=${encodeURIComponent(decodeURIComponent(parts[parts.length - 1]))}`;
} else {
  target = '/index.html';
}

location.replace(`${target}${location.search && !target.includes('?') ? location.search : ''}${location.hash}`);
</script>
</body>
</html>
