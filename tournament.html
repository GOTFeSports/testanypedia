<script src="/data.js"></script>
<script src="/teams.js"></script>
<script src="/organizers.js"></script>

<style>
/* ============================================================
   CSS VARIABLES
   ============================================================ */
:root {
  --bg:         #0f0f10;
  --bg2:        #151516;
  --bg3:        #1c1c1e;
  --border:     #252528;
  --text:       #eaeaea;
  --text-muted: #888;
  --accent:     #6bb6ff;
  --accent2:    #3d8fe0;
  --tg:         #2ea6ff;
  --live:       #ff6b6b;
  --upcoming:   #6bb6ff;
  --finished:   #5dff9c;
  --radius:     12px;
  --shadow:     0 4px 24px rgba(0,0,0,.45);
  --transition: color .25s, background-color .25s, border-color .25s;
}
[data-theme="light"] {
  --bg:         #f4f4f6;
  --bg2:        #ffffff;
  --bg3:        #e8e8ec;
  --border:     #d0d0d8;
  --text:       #111114;
  --text-muted: #666;
  --accent:     #1a6fcc;
  --accent2:    #1452a0;
  --tg:         #1a88d6;
  --shadow:     0 4px 24px rgba(0,0,0,.12);
  --finished:   #1a7a3a;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { background: #0f0f10; }
html[data-theme="light"] { background: #f4f4f6; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  transition: var(--transition);
  min-height: 100vh;
}
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent2); }

/* ============================================================
   SITE HEADER (sticky)
   ============================================================ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  transition: var(--transition);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.logo-wrap { display: flex; flex-direction: column; }
.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .5px;
  line-height: 1;
  transition: color .2s;
}
.logo:hover { color: var(--accent); }
.logo-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
}
.header-search {
  width: 240px;
  padding: 9px 14px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s, var(--transition);
}
.header-search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(107,182,255,.15);
}
.header-search::placeholder { color: var(--text-muted); }

/* ============================================================
   LAYOUT
   ============================================================ */
.page-body {
  max-width: 1200px;
  margin: 24px auto 60px;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 1fr 310px;
  gap: 20px;
  align-items: start;
}

/* ============================================================
   BLOCK (card)
   ============================================================ */
.block {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  transition: var(--transition);
}
.block h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: .5px;
  margin-bottom: 14px;
  color: var(--text);
}

/* ============================================================
   INFOBOX (sidebar)
   ============================================================ */
.infobox {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  position: sticky;
  top: 72px;
  transition: var(--transition);
}
.infobox h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 14px;
  line-height: 1.2;
}
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.info-row:last-of-type { border-bottom: none; }
.info-label { color: var(--text-muted); flex-shrink: 0; }
.info-val   { font-weight: 500; text-align: right; }

/* Action buttons */
.action-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 14px;
}
.btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 11px;
  border-radius: 9px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  border: none;
  font-family: 'Inter', sans-serif;
}
.btn:active { transform: scale(.98); }
.btn:hover  { opacity: .88; }
.btn-reg    { background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-tg     { background: var(--tg);    color: #000; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-share  {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

/* ============================================================
   COUNTDOWN
   ============================================================ */
.countdown-wrap { margin-bottom: 14px; }
.start-time-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
.start-time-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 10px;
}
.countdown { display: flex; gap: 8px; }
.cd-unit {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: center;
  padding: 8px 4px 6px;
}
.cd-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.cd-lbl {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-top: 2px;
}
.countdown-status {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  padding: 10px 0;
}
.status-live     { color: var(--live); }
.status-finished { color: var(--finished); }

/* ============================================================
   TITLE
   ============================================================ */
.title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.page-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px;
  font-weight: 700;
  line-height: 1.1;
}

/* ============================================================
   DESCRIPTION
   ============================================================ */
.desc-text { font-size: 13px; line-height: 1.65; color: var(--text-muted); }
.block-section-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 16px 0 8px;
}

/* ============================================================
   PRIZE TABLE
   ============================================================ */
.prize-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  color: var(--text-muted);
}
.prize-table th {
  text-align: left;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.prize-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
.prize-table tr:last-child td { border-bottom: none; }
.prize-place { font-size: 16px; }

/* ============================================================
   TEAMS GRID
   ============================================================ */
.team-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.team-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px;
  font-size: 12px;
  transition: var(--transition);
}
.team-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.team-header img {
  width: 20px; height: 20px;
  border-radius: 4px;
  object-fit: cover;
}
.team-name {
  font-weight: 600;
  font-size: 13px;
  color: var(--text);
  word-break: break-word;
  line-height: 1.3;
}

/* Строка ростера:
   nick — слева, pos — слева тоже но после ника.
   Используем grid с фиксированной шириной для pos. */
.roster-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  padding: 3px 0;
  border-bottom: 1px solid var(--border);
}
.roster-row:last-child { border-bottom: none; }
.nick {
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* Тип участия команды (Invited, Closed Qual и т.д.) — под последним игроком */
.team-seed {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--border);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .4px;
  text-transform: uppercase;
  color: var(--accent);
  text-align: center;
}
/* pos: маленький бейдж, фиксированная ширина, выравнивается по правому краю */
.pos {
  color: var(--text-muted);
  font-size: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 600;
}

/* ============================================================
   BRACKET iframe
   ============================================================ */
.bracket-frame {
  border-radius: 9px;
  border: 1px solid var(--border);
  width: 100%;
  height: 500px;
  display: block;
}

/* ============================================================
   EXTRA LINKS (Dotabuff, Discord, Rules, Bracket)
   ============================================================ */
.extra-links {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  justify-content: center;   /* центрируем иконки */
  flex-wrap: wrap;
}
.link-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .2s, transform .2s;
  overflow: hidden;
}
.link-icon:hover {
  border-color: var(--accent);
  transform: scale(1.08);
}
.link-icon img {
  width: 26px;
  height: 26px;
  object-fit: contain;
}
/* Rules и Bracket — SVG/PNG иконки тёмные на тёмном фоне.
   Инвертируем в тёмной теме чтобы они стали белыми. */
[data-theme="dark"] .link-icon.link-rules img,
[data-theme="dark"] .link-icon.link-bracket img {
  filter: invert(1);
}

/* ============================================================
   CASTERS
   ============================================================ */
.caster-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 10px 14px;
  margin-bottom: 8px;
  font-size: 13px;
  transition: var(--transition);
}
.caster-item:last-child { margin-bottom: 0; }

/* ============================================================
   FLOATING BUTTONS
   ============================================================ */
.fab {
  position: fixed;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  box-shadow: var(--shadow);
  transition: transform .2s, background .2s, opacity .3s, var(--transition);
}
.fab:hover { transform: scale(1.1); }
.fab svg { width: 18px; height: 18px; pointer-events: none; }
#themeBtn { bottom: 24px; left:  24px; }
#toTopBtn { bottom: 24px; right: 24px; opacity: 0; pointer-events: none; }
#toTopBtn.visible { opacity: 1; pointer-events: auto; }

/* ============================================================
   TOAST
   ============================================================ */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 18px;
  border-radius: 999px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.search-hidden { display: none !important; }

/* ============================================================
   RESPONSIVE
   ============================================================ */

/* ── Планшет ── */
@media (max-width: 900px) {
  .page-body { grid-template-columns: 1fr; }
  #infobox   { order: -1; position: static; }
  #mainCol   { order: 1; }
  .infobox   { position: static; }
  .team-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── Мобильный ── */
@media (max-width: 640px) {
  /* Header */
  .header-inner {
    flex-wrap: wrap;
    padding: 10px 16px;
    gap: 8px;
    align-items: flex-start;
  }
  .logo-wrap { max-width: calc(100% - 50px); }

  /* Layout */
  .page-body {
    padding: 0 12px;
    margin-top: 14px;
    gap: 0;
  }

  /* Blocks */
  .block { padding: 14px 16px; margin-bottom: 10px; border-radius: 10px; }
  .block h2 { font-size: 16px; }
  .page-title { font-size: 20px; }
  .desc-text { font-size: 12px; }

  /* Infobox */
  .infobox { padding: 14px 16px; border-radius: 10px; }
  .infobox h2 { font-size: 16px; }
  .info-row { font-size: 12px; padding: 6px 0; }

  /* Countdown */
  .cd-num { font-size: 20px; }
  .cd-lbl { font-size: 9px; }
  .countdown { gap: 5px; }
  .start-time-val { font-size: 14px; }

  /* Buttons — в ряд на мобилке */
  .action-btns { flex-direction: row; flex-wrap: wrap; gap: 8px; }
  .btn { flex: 1; min-width: 110px; font-size: 13px; padding: 9px 6px; }

  /* Teams grid */
  .team-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .team-name { font-size: 11px; }
  .nick { font-size: 10px; }

  /* Bracket */
  .bracket-frame { height: 300px; }

  /* Prize table */
  .prize-table td,
  .prize-table th { padding: 6px; font-size: 12px; }

  /* FABs */
  .fab { width: 40px; height: 40px; }
  #themeBtn { bottom: 14px; left: 14px; }
  #toTopBtn { bottom: 14px; right: 14px; }

  /* Extra links */
  .extra-links { gap: 8px; }
  .link-icon { width: 38px; height: 38px; }
  .link-icon img { width: 22px; height: 22px; }
}

/* ── Очень маленькие ── */
@media (max-width: 400px) {
  .team-grid { grid-template-columns: 1fr; }
  .logo { font-size: 20px; }
  .page-title { font-size: 18px; }
  .btn { font-size: 12px; padding: 8px 4px; }
}

/* ── SITE NAV ── */
.site-nav {
  display: flex; align-items: center; gap: 4px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px;
}
.nav-link {
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text-muted); padding: 6px 14px; border-radius: 7px;
  text-decoration: none; transition: color .2s, background .2s; white-space: nowrap;
}
.nav-link:hover { color: var(--text); background: var(--bg2); }
.nav-link.active { color: var(--accent); background: var(--bg2); }

/* ── GLOBAL SEARCH ── */
.header-search-wrap { position: relative; width: 300px; }
.header-search { width: 100%; padding: 9px 14px 9px 36px; }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none; width: 15px; height: 15px;
}
.search-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
  z-index: 500; display: none; max-height: 400px; overflow-y: auto;
}
.search-dropdown.visible { display: block; }
.sd-group-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text-muted); padding: 10px 14px 6px;
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
.sd-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px;
  cursor: pointer; transition: background .12s;
  border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text);
}
.sd-item:last-child { border-bottom: none; }
.sd-item:hover, .sd-item.active { background: var(--bg3); }
.sd-icon {
  width: 28px; height: 28px; border-radius: 6px; background: var(--bg3);
  border: 1px solid var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 13px; flex-shrink: 0;
}
.sd-item img.sd-logo {
  width: 28px; height: 28px; border-radius: 6px; object-fit: cover;
  border: 1px solid var(--border); flex-shrink: 0;
}
.sd-info { min-width: 0; }
.sd-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sd-meta  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.sd-badge {
  margin-left: auto; flex-shrink: 0; font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 999px; border: 1px solid var(--border);
  color: var(--text-muted); background: var(--bg3);
}
.sd-empty { padding: 16px 14px; color: var(--text-muted); font-size: 13px; text-align: center; }
@media (max-width: 640px) {
  .header-search-wrap { width: 100%; order: 3; }
  .site-nav { order: 2; width: 100%; justify-content: flex-start; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .nav-link { padding: 6px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-wrap">
      <a class="logo" href="/index.html">Anypedia</a>
      <div class="logo-sub">Киберспортивное Dota 2 Wiki</div>
    </div>
    <nav class="site-nav">
      <a class="nav-link active" href="/index.html">Турниры</a>
      <a class="nav-link" href="/teams-list.html">Команды</a>
      <a class="nav-link" href="/organizers-list.html">Организаторы</a>
    </nav>
    <div class="header-search-wrap" id="searchWrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" class="header-search" placeholder="Поиск турниров и команд…" autocomplete="off"/>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>
</header>

<!-- PAGE BODY -->
<div class="page-body" id="pageBody" style="display:none">

  <!-- LEFT COLUMN -->
  <div id="mainCol">
    <div class="block" id="descBlock"></div>
    <div class="block">
      <h2>Участники</h2>
      <div class="team-grid" id="teams"></div>
    </div>
    <div class="block">
      <h2>Сетка турнира</h2>
      <iframe class="bracket-frame" id="bracketFrame" allowfullscreen></iframe>
    </div>
    <div class="block">
      <h2>Кастеры</h2>
      <div id="casters"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN — INFOBOX -->
  <aside class="infobox" id="infobox"></aside>

</div>

<!-- FLOATING BUTTONS -->
<button class="fab" id="themeBtn" title="Тема" aria-label="Тема">
  <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
</button>
<button class="fab" id="toTopBtn" title="Наверх" aria-label="Наверх">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<div id="toast"></div>

<script>
/* ---------- THEME ---------- */
const html = document.documentElement;
const themeBtn  = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');
const MOON = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
const SUN  = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  themeIcon.innerHTML = t === 'dark' ? MOON : SUN;
  localStorage.setItem('ap-theme', t);
}
applyTheme(localStorage.getItem('ap-theme') || 'dark');
themeBtn.addEventListener('click', () =>
  applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

/* ---------- BACK TO TOP ---------- */
const toTopBtn = document.getElementById('toTopBtn');
window.addEventListener('scroll', () =>
  toTopBtn.classList.toggle('visible', window.scrollY > 300));
toTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* ---------- TOAST ---------- */
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* ---------- SHARE ---------- */
function doShare() {
  const url   = window.location.href;
  const title = document.title;
  if (navigator.share) {
    navigator.share({ title, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('✓ Ссылка скопирована'));
  }
}

/* ---------- TOURNAMENT DATA ---------- */
function getTournamentIdFromUrl() {
  const paramsId = new URLSearchParams(window.location.search).get('id');
  if (paramsId) return paramsId;

  const path = location.pathname.replace(/\/+$/, '');
  const lastSegment = decodeURIComponent(path.split('/').pop() || '');
  if (!lastSegment || lastSegment === 'tournament.html' || lastSegment === 'index.html') return '';
  return lastSegment;
}

function getSiteBasePath(id) {
  const path = location.pathname;
  if (path.endsWith('/tournament.html') || path.endsWith('/index.html')) {
    return path.slice(0, path.lastIndexOf('/') + 1) || '/';
  }
  const suffix = `/${encodeURIComponent(id)}`;
  return path.endsWith(suffix) ? path.slice(0, -suffix.length + 1) : '/';
}

const id = getTournamentIdFromUrl();
const t  = tournaments.find(x => x.id === id);

if (t && new URLSearchParams(window.location.search).has('id')) {
  history.replaceState(null, '', `${getSiteBasePath(id)}${encodeURIComponent(id)}`);
}

if (!t) {
  document.body.innerHTML = `
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;
                background:var(--bg);font-family:'Inter',sans-serif;text-align:center">
      <div>
        <h1 style="font-size:22px;margin-bottom:10px">❌ Турнир не найден</h1>
        <p style="color:#888;margin-bottom:20px">Проверьте ссылку или вернитесь на главную</p>
        <a href="/index.html" style="padding:10px 18px;background:#1c1c1e;border:1px solid #2a2a2a;
           border-radius:10px;color:#6bb6ff;display:inline-block">← Назад</a>
      </div>
    </div>`;
  throw new Error('Tournament not found');
}

document.title = `${t.title} · Anypedia`;
document.getElementById('pageBody').style.display = 'grid';

/* ---------- DATE / STATUS HELPERS ---------- */
function toLocalDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatDateLong(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('ru-RU', {
    day: 'numeric', month: 'long', year: 'numeric'
  });
}

const now   = new Date();
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
const startD = toLocalDate(t.start);
const endD   = toLocalDate(t.end);

function getTournamentStatus() {
  if (today < startD) return 'upcoming';
  if (today > endD)   return 'finished';
  return 'live';
}

/* ---------- COUNTDOWN ---------- */
function buildMskStartDate() {
  const [y, m, d] = t.start.split('-').map(Number);
  const time = t.startTime || '12:00';
  const [hh, mm] = time.split(':').map(Number);
  return new Date(Date.UTC(y, m - 1, d, hh - 3, mm, 0));
}

const mskStart = buildMskStartDate();

function formatMskLabel() {
  const [y, m, d] = t.start.split('-').map(Number);
  const date = new Date(y, m - 1, d).toLocaleDateString('ru-RU', {
    day: 'numeric', month: 'long', year: 'numeric'
  });
  return `${date}, ${t.startTime || '12:00'} МСК`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function renderCountdown() {
  const status = getTournamentStatus();
  if (status === 'live')     return `<div class="countdown-status status-live">🔴 Турнир идёт прямо сейчас</div>`;
  if (status === 'finished') return `<div class="countdown-status status-finished">✅ Турнир завершён</div>`;

  const diff = mskStart - Date.now();
  if (diff <= 0) return `<div class="countdown-status status-live">🔴 Стартует сейчас!</div>`;

  const days    = Math.floor(diff / 86400000);
  const hours   = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  return `
    <div class="start-time-label">Дата и время старта (МСК)</div>
    <div class="start-time-val">${formatMskLabel()}</div>
    <div class="countdown" id="cdWrap">
      <div class="cd-unit"><div class="cd-num" id="cdD">${pad(days)}</div><div class="cd-lbl">дней</div></div>
      <div class="cd-unit"><div class="cd-num" id="cdH">${pad(hours)}</div><div class="cd-lbl">часов</div></div>
      <div class="cd-unit"><div class="cd-num" id="cdM">${pad(minutes)}</div><div class="cd-lbl">минут</div></div>
      <div class="cd-unit"><div class="cd-num" id="cdS">${pad(seconds)}</div><div class="cd-lbl">секунд</div></div>
    </div>`;
}

function tickCountdown() {
  if (getTournamentStatus() !== 'upcoming') return;
  const diff = mskStart - Date.now();
  if (diff <= 0) {
    const wrap = document.getElementById('cdWrap');
    if (wrap) wrap.outerHTML = `<div class="countdown-status status-live">🔴 Стартует сейчас!</div>`;
    return;
  }
  const elD = document.getElementById('cdD');
  const elH = document.getElementById('cdH');
  const elM = document.getElementById('cdM');
  const elS = document.getElementById('cdS');
  if (elD) elD.textContent = pad(Math.floor(diff / 86400000));
  if (elH) elH.textContent = pad(Math.floor((diff % 86400000) / 3600000));
  if (elM) elM.textContent = pad(Math.floor((diff % 3600000) / 60000));
  if (elS) elS.textContent = pad(Math.floor((diff % 60000) / 1000));
}
setInterval(tickCountdown, 1000);

/* ---------- TEAM LOOKUP ---------- */
function normStr(v) {
  return String(v || '').normalize('NFKC').replace(/\s+/g, ' ').trim().toLowerCase();
}
function slugifyTeam(value) {
  return String(value || '').normalize('NFKC').trim()
    .replace(/\s+/g, '-').replace(/[^\p{L}\p{N}_-]+/gu, '')
    .replace(/-+/g, '-').replace(/^-|-$/g, '') || 'team';
}
function getTeamPageId(team) {
  return team.id || slugifyTeam(team.name);
}
function teamAllNames(team) {
  const a = team.aliases || [];
  const list = Array.isArray(a) ? a : String(a).split(',').map(s => s.trim()).filter(Boolean);
  return [team.name, ...list].filter(Boolean).map(normStr);
}
function findTeamByName(name) {
  if (!name || name === '—' || name.toLowerCase() === 'tbd') return null;
  const allTeams = typeof teams !== 'undefined' ? teams : [];
  const key = normStr(name);
  return allTeams.find(team => teamAllNames(team).includes(key)) || null;
}
function getSiteBase() {
  return location.origin + getSiteBasePath(id);
}
/* Оборачивает имя команды в ссылку если команда найдена в teams.js */
function renderTeamLink(name, style = '') {
  if (!name || name === '—') return name || '—';
  const found = findTeamByName(name);
  if (!found) return name;
  const tid = getTeamPageId(found);
  return `<a href="${getSiteBase()}team/${encodeURIComponent(tid)}" style="color:var(--accent);font-weight:600${style ? ';' + style : ''}">${name}</a>`;
}

/* Оборачивает имя организатора в ссылку если организатор найден в organizers.js */
function renderOrganizerLink(name) {
  if (!name || name === '—') return name || '—';
  const found = typeof findOrganizerByName === 'function' ? findOrganizerByName(name) : null;
  if (!found) return name;
  const oid = getOrganizerId(found);
  return `<a href="${getSiteBase()}organizer/${encodeURIComponent(oid)}" style="color:var(--accent);font-weight:600">${name}</a>`;
}

/* ---------- INFOBOX ---------- */
const dateText = t.start === t.end
  ? formatDateLong(t.start)
  : `${formatDateLong(t.start)} — ${formatDateLong(t.end)}`;

document.getElementById('infobox').innerHTML = `
  <h2>${t.title}</h2>
  <div class="countdown-wrap">${renderCountdown()}</div>
  <div class="info-row"><span class="info-label">Даты</span><span class="info-val">${dateText}</span></div>
  <div class="info-row"><span class="info-label">Приз</span><span class="info-val" style="font-weight:700;color:var(--accent)">${t.prize || '—'}</span></div>
  <div class="info-row"><span class="info-label">Регион</span><span class="info-val">${t.location || '—'}</span></div>
  <div class="info-row"><span class="info-label">Команд</span><span class="info-val">${t.teams ?? '—'}</span></div>
  <div class="info-row"><span class="info-label">Формат</span><span class="info-val">${t.format || '—'}</span></div>
  <div class="info-row"><span class="info-label">Лимит</span><span class="info-val">${t.limit || '—'}</span></div>
  <div class="info-row"><span class="info-label">Победитель</span><span class="info-val">${renderTeamLink(t.winner || 'TBD')}</span></div>
  <div class="info-row"><span class="info-label">Организатор</span><span class="info-val">${renderOrganizerLink(t.organizer || '—')}</span></div>
  <div class="action-btns">
    ${t.registrationLink ? `<a class="btn btn-reg" href="${t.registrationLink}" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>
      </svg>
      Регистрация
    </a>` : ''}
    ${t.telegramLink     ? `<a class="btn btn-tg"  href="${t.telegramLink}"     target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 14.173l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.386z"/>
      </svg>
      Telegram
    </a>` : ''}
    <button class="btn btn-share" onclick="doShare()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      Поделиться
    </button>
  </div>
  ${(t.links && (t.links.dotabuff || t.links.discord || t.links.rules || t.links.bracket)) ? `
  <div class="extra-links">
    ${t.links.dotabuff ? `<a href="${t.links.dotabuff}" target="_blank" rel="noopener" class="link-icon" title="Dotabuff"><img src="/dotabuff.png" alt="Dotabuff"></a>` : ''}
    ${t.links.discord  ? `<a href="${t.links.discord}"  target="_blank" rel="noopener" class="link-icon" title="Discord"><img src="/discord.png" alt="Discord"></a>` : ''}
    ${t.links.rules    ? `<a href="${t.links.rules}"    target="_blank" rel="noopener" class="link-icon link-rules" title="Правила"><img src="/rules.png" alt="Rules"></a>` : ''}
    ${t.links.bracket  ? `<a href="${t.links.bracket}"  target="_blank" rel="noopener" class="link-icon link-bracket" title="Сетка"><img src="/bracket.png" alt="Bracket"></a>` : ''}
  </div>` : ''}
`;

/* ---------- DESCRIPTION + PRIZES ---------- */
function prizeTable() {
  if (!Array.isArray(t.prizePool) || !t.prizePool.length) {
    return `<div style="color:var(--text-muted);font-size:13px">Призовой фонд не указан</div>`;
  }
  const medals = ['🥇','🥈','🥉','🏅'];
  const rows = [...t.prizePool].sort((a,b) => a.place - b.place).map(p => `
    <tr>
      <td><span class="prize-place">${medals[p.place-1]||'🏅'}</span> ${p.place}</td>
      <td>${renderTeamLink(p.team || '—')}</td>
      <td style="font-weight:600;color:var(--text)">${p.amount}</td>
    </tr>`).join('');
  return `
    <table class="prize-table">
      <thead><tr><th>Место</th><th>Команда</th><th>Приз</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

document.getElementById('descBlock').innerHTML = `
  <div class="title-row"><h1 class="page-title">${t.title}</h1></div>
  <p class="desc-text">${t.description || '—'}</p>
  <div class="block-section-label">Формат</div>
  <p class="desc-text">${t.format || '—'}</p>
  <div class="block-section-label">Призовой фонд</div>
  ${prizeTable()}
`;

/* ---------- TEAMS ---------- */
// Позиции: 1=Carry, 2=Mid, 3=Offlane, 4=Soft Support, 5=Hard Support
const posLabel = { 1:'Carry', 2:'Mid', 3:'Off', 4:'Sup', 5:'HS' };

document.getElementById('teams').innerHTML = (t.teamsList || []).map(team => `
  <div class="team-card">
    <div class="team-header">
      <img src="${team.logo || 'dota2.png'}" alt="${team.name}">
      <div class="team-name">${renderTeamLink(team.name)}</div>
    </div>
    ${(team.roster || []).sort((a,b) => a.pos - b.pos).map(p => `
      <div class="roster-row">
        <span class="nick">${p.nick}</span>
        <span class="pos" title="Позиция ${p.pos}">${p.pos}</span>
      </div>`).join('')}
    ${team.seed ? `<div class="team-seed">${team.seed}</div>` : ''}
  </div>`).join('');

/* ---------- BRACKET ---------- */
document.getElementById('bracketFrame').src = t.bracketEmbed || '';

/* ---------- CASTERS ---------- */
document.getElementById('casters').innerHTML = (t.casters || []).map(c => `
  <div class="caster-item">
    ${c.link
      ? `<a href="${c.link}" target="_blank" rel="noopener">${c.name || 'TBD'}</a>`
      : `<span>${c.name || 'TBD'}</span>`}
  </div>`).join('');
</script>
<script src="/search.js"></script>
</body>
</html>
